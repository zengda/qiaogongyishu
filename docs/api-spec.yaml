openapi: 3.0.3
info:
  title: 巧工艺墅 - 微信小程序 API 接口文档
  description: |
    巧工艺墅微信小程序后端接口规范，包含小程序端接口和管理后台接口。

    ## 统一响应格式

    所有接口统一返回以下 JSON 格式：

    ```json
    {
      "code": 200,
      "message": "success",
      "data": {}
    }
    ```

    分页响应格式：

    ```json
    {
      "code": 200,
      "message": "success",
      "data": {
        "items": [],
        "total": 100,
        "page": 1,
        "per_page": 10,
        "pages": 10
      }
    }
    ```

    ## 认证方式

    管理后台接口使用 Bearer Token (JWT) 认证，在请求头中携带：
    ```
    Authorization: Bearer <token>
    ```

    小程序端接口不需要认证。
  version: 2.0.0
  contact:
    name: 巧工艺墅技术团队

servers:
  - url: /api/v1
    description: API 基础路径

security:
  - BearerAuth: []

tags:
  - name: 小程序-认证
    description: 小程序端用户认证相关接口
  - name: 小程序-首页
    description: 小程序端首页相关接口（Banner、分类、标签）
  - name: 小程序-产品
    description: 小程序端产品浏览和搜索相关接口
  - name: 小程序-客户
    description: 小程序端客户表单提交接口
  - name: 小程序-系统
    description: 小程序端系统配置相关接口
  - name: 管理后台-认证
    description: 管理后台管理员认证相关接口
  - name: 管理后台-仪表盘
    description: 管理后台仪表盘统计接口
  - name: 管理后台-产品管理
    description: 管理后台产品增删改查接口
  - name: 管理后台-分类管理
    description: 管理后台分类增删改查接口
  - name: 管理后台-标签管理
    description: 管理后台标签增删改查接口
  - name: 管理后台-Banner管理
    description: 管理后台Banner增删改查接口
  - name: 管理后台-客户管理
    description: 管理后台客户管理和导出接口
  - name: 管理后台-上传
    description: 管理后台文件上传接口
  - name: 管理后台-系统设置
    description: 管理后台系统设置接口
  - name: 管理后台-存储配置
    description: 管理后台存储配置管理接口

paths:
  # ============================================================
  # 小程序端接口
  # ============================================================

  /auth/wx-login:
    post:
      tags:
        - 小程序-认证
      summary: 微信登录
      description: 通过微信小程序的临时登录凭证 code 换取用户 token 和 openid
      security: []
      operationId: wxLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WxLoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WxLoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /banners:
    get:
      tags:
        - 小程序-首页
      summary: 获取Banner列表
      description: 获取小程序首页展示的 Banner 列表，仅返回当前有效的 Banner
      security: []
      operationId: getBanners
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BannerListResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /categories:
    get:
      tags:
        - 小程序-首页
      summary: 获取分类列表
      description: 获取产品分类列表，用于小程序端筛选和展示
      security: []
      operationId: getCategories
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryListResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /tags:
    get:
      tags:
        - 小程序-首页
      summary: 获取风格标签列表
      description: 获取产品风格标签列表，用于小程序端筛选和展示
      security: []
      operationId: getTags
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagListResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /products:
    get:
      tags:
        - 小程序-产品
      summary: 获取产品列表
      description: 根据分类、标签、关键词等条件筛选产品列表，支持分页
      security: []
      operationId: getProducts
      parameters:
        - name: category_id
          in: query
          description: 分类ID筛选
          required: false
          schema:
            type: integer
            example: 1
        - name: tag_id
          in: query
          description: 标签ID筛选
          required: false
          schema:
            type: integer
            example: 2
        - name: page
          in: query
          description: 页码
          required: false
          schema:
            type: integer
            default: 1
            example: 1
        - name: per_page
          in: query
          description: 每页数量
          required: false
          schema:
            type: integer
            default: 10
            example: 10
        - name: keyword
          in: query
          description: 搜索关键词
          required: false
          schema:
            type: string
            example: 别墅
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductPaginatedResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /products/{id}:
    get:
      tags:
        - 小程序-产品
      summary: 获取产品详情
      description: 根据产品ID获取产品详细信息，包含主图（banner_images）和详情图（detail_images）
      security: []
      operationId: getProductDetail
      parameters:
        - name: id
          in: path
          description: 产品ID
          required: true
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetailResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /products/{id}/view:
    post:
      tags:
        - 小程序-产品
      summary: 记录产品浏览
      description: 记录用户浏览产品的行为，用于统计产品浏览量
      security: []
      operationId: recordProductView
      parameters:
        - name: id
          in: path
          description: 产品ID
          required: true
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: 记录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /search:
    get:
      tags:
        - 小程序-产品
      summary: 搜索产品
      description: 根据关键词搜索产品，支持分页
      security: []
      operationId: searchProducts
      parameters:
        - name: keyword
          in: query
          description: 搜索关键词
          required: true
          schema:
            type: string
            example: 别墅
        - name: page
          in: query
          description: 页码
          required: false
          schema:
            type: integer
            default: 1
            example: 1
        - name: per_page
          in: query
          description: 每页数量
          required: false
          schema:
            type: integer
            default: 10
            example: 10
      responses:
        '200':
          description: 搜索成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductPaginatedResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /customers:
    post:
      tags:
        - 小程序-客户
      summary: 提交客户表单
      description: 小程序端用户提交客户咨询表单，包含联系信息和意向产品
      security: []
      operationId: createCustomer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomerRequest'
      responses:
        '200':
          description: 提交成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /settings/{key}:
    get:
      tags:
        - 小程序-系统
      summary: 获取系统设置
      description: 根据设置键名获取对应的系统设置值
      security: []
      operationId: getSettingByKey
      parameters:
        - name: key
          in: path
          description: 设置键名
          required: true
          schema:
            type: string
            example: site_name
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /storage/config:
    get:
      tags:
        - 小程序-系统
      summary: 获取当前存储配置信息
      description: 获取当前存储配置信息（公开接口），返回当前存储类型等基本信息，不包含敏感信息
      security: []
      operationId: getPublicStorageConfig
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicStorageConfigResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ============================================================
  # 管理后台接口
  # ============================================================

  /admin/auth/login:
    post:
      tags:
        - 管理后台-认证
      summary: 管理员登录
      description: 管理员使用用户名和密码登录后台系统，返回 JWT Token
      security: []
      operationId: adminLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminLoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminLoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /admin/auth/logout:
    post:
      tags:
        - 管理后台-认证
      summary: 管理员登出
      description: 管理员退出登录，使当前 Token 失效
      operationId: adminLogout
      responses:
        '200':
          description: 登出成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /admin/auth/password:
    put:
      tags:
        - 管理后台-认证
      summary: 修改密码
      description: 管理员修改当前账号的登录密码
      operationId: adminChangePassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: 修改成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /admin/dashboard:
    get:
      tags:
        - 管理后台-仪表盘
      summary: 仪表盘统计数据
      description: 获取管理后台仪表盘所需的统计数据，包括产品数量、客户数量、今日新增等
      operationId: getDashboard
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /admin/products:
    get:
      tags:
        - 管理后台-产品管理
      summary: 产品列表
      description: 获取管理后台产品列表，支持按关键词、分类、状态筛选和分页
      operationId: adminGetProducts
      parameters:
        - name: keyword
          in: query
          description: 搜索关键词
          required: false
          schema:
            type: string
            example: 别墅
        - name: category_id
          in: query
          description: 分类ID筛选
          required: false
          schema:
            type: integer
            example: 1
        - name: status
          in: query
          description: 产品状态筛选（active=上架, inactive=下架）
          required: false
          schema:
            type: string
            enum: [active, inactive]
            example: active
        - name: page
          in: query
          description: 页码
          required: false
          schema:
            type: integer
            default: 1
            example: 1
        - name: per_page
          in: query
          description: 每页数量
          required: false
          schema:
            type: integer
            default: 10
            example: 10
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductPaginatedResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - 管理后台-产品管理
      summary: 创建产品
      description: 在管理后台创建新产品
      operationId: adminCreateProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '200':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /admin/products/{id}:
    get:
      tags:
        - 管理后台-产品管理
      summary: 获取产品详情
      description: 在管理后台根据产品ID获取产品详细信息
      operationId: adminGetProductDetail
      parameters:
        - name: id
          in: path
          description: 产品ID
          required: true
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetailResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
        - 管理后台-产品管理
      summary: 更新产品
      description: 在管理后台更新指定产品的信息
      operationId: adminUpdateProduct
      parameters:
        - name: id
          in: path
          description: 产品ID
          required: true
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - 管理后台-产品管理
      summary: 删除产品
      description: 在管理后台删除指定产品
      operationId: adminDeleteProduct
      parameters:
        - name: id
          in: path
          description: 产品ID
          required: true
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /admin/products/{id}/status:
    patch:
      tags:
        - 管理后台-产品管理
      summary: 切换产品上下架状态
      description: 切换指定产品的上架/下架状态
      operationId: adminToggleProductStatus
      parameters:
        - name: id
          in: path
          description: 产品ID
          required: true
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: 操作成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /admin/categories:
    get:
      tags:
        - 管理后台-分类管理
      summary: 分类列表
      description: 获取管理后台产品分类列表
      operationId: adminGetCategories
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - 管理后台-分类管理
      summary: 创建分类
      description: 在管理后台创建新的产品分类
      operationId: adminCreateCategory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCategoryRequest'
      responses:
        '200':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /admin/categories/{id}:
    put:
      tags:
        - 管理后台-分类管理
      summary: 更新分类
      description: 在管理后台更新指定分类的信息
      operationId: adminUpdateCategory
      parameters:
        - name: id
          in: path
          description: 分类ID
          required: true
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCategoryRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - 管理后台-分类管理
      summary: 删除分类
      description: 在管理后台删除指定分类
      operationId: adminDeleteCategory
      parameters:
        - name: id
          in: path
          description: 分类ID
          required: true
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /admin/tags:
    get:
      tags:
        - 管理后台-标签管理
      summary: 标签列表
      description: 获取管理后台产品风格标签列表
      operationId: adminGetTags
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - 管理后台-标签管理
      summary: 创建标签
      description: 在管理后台创建新的产品风格标签
      operationId: adminCreateTag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTagRequest'
      responses:
        '200':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /admin/tags/{id}:
    put:
      tags:
        - 管理后台-标签管理
      summary: 更新标签
      description: 在管理后台更新指定标签的信息
      operationId: adminUpdateTag
      parameters:
        - name: id
          in: path
          description: 标签ID
          required: true
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTagRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
