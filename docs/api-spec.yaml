    # ============================================================
    # 存储配置 Schema
    # ============================================================

    StorageConfig:
      type: object
      description: 存储配置信息
      properties:
        id:
          type: integer
          description: 配置ID
          example: 1
        storage_type:
          type: string
          description: 存储类型（local=本地存储, oss=阿里云OSS）
          enum: [local, oss]
          example: oss
        local_base_url:
          type: string
          description: 本地存储的基础访问URL
          example: "http://localhost:5000/uploads"
        local_upload_path:
          type: string
          description: 本地存储的上传目录路径
          example: "/app/uploads"
        oss_access_key_id:
          type: string
          description: 阿里云 OSS AccessKey ID
          example: "LTAI5tXXXXXXXXXX"
        oss_access_key_secret:
          type: string
          description: 阿里云 OSS AccessKey Secret（脱敏显示）
          example: "LTAI5t**********3xKp"
        oss_bucket_name:
          type: string
          description: OSS Bucket 名称
          example: "qiaogongyishu"
        oss_endpoint:
          type: string
          description: OSS Endpoint
          example: "oss-cn-hangzhou.aliyuncs.com"
        oss_cdn_domain:
          type: string
          description: OSS CDN 加速域名
          example: "https://cdn.example.com"
        oss_custom_domain:
          type: string
          description: OSS 自定义域名（可选）
          nullable: true
          example: "https://img.example.com"
        oss_region:
          type: string
          description: OSS 地域
          example: "cn-hangzhou"
        max_file_size:
          type: integer
          description: 最大文件大小（字节）
          example: 5242880
        allowed_extensions:
          type: string
          description: 允许的文件扩展名（逗号分隔）
          example: "jpg,jpeg,png,webp,gif"
        is_active:
          type: boolean
          description: 是否为当前生效配置
          example: true
        updated_at:
          type: string
          format: date-time
          description: 最后更新时间
          example: "2026-04-27T10:30:00+08:00"

    PublicStorageConfigData:
      type: object
      description: 公开存储配置信息（不含敏感信息）
      properties:
        storage_type:
          type: string
          description: 当前存储类型
          enum: [local, oss]
          example: oss

    PublicStorageConfigResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: success
        data:
          $ref: '#/components/schemas/PublicStorageConfigData'

    StorageConfigResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: success
        data:
          $ref: '#/components/schemas/StorageConfig'

    UpdateStorageConfigRequest:
      type: object
      required:
        - storage_type
      properties:
        storage_type:
          type: string
          description: 存储类型（local=本地存储, oss=阿里云OSS）
          enum: [local, oss]
          example: oss
        local_base_url:
          type: string
          description: 本地存储的基础访问URL（storage_type=local 时填写）
          example: "http://localhost:5000/uploads"
        local_upload_path:
          type: string
          description: 本地存储的上传目录路径（storage_type=local 时填写）
          example: "/app/uploads"
        oss_access_key_id:
          type: string
          description: 阿里云 OSS AccessKey ID（storage_type=oss 时填写）
          example: "LTAI5tXXXXXXXXXX"
        oss_access_key_secret:
          type: string
          description: 阿里云 OSS AccessKey Secret（storage_type=oss 时填写）
          example: "XXXXXXXXXXXXXXXXXXXXXXXXXX"
        oss_bucket_name:
          type: string
          description: OSS Bucket 名称（storage_type=oss 时填写）
          example: "qiaogongyishu"
        oss_endpoint:
          type: string
          description: OSS Endpoint（storage_type=oss 时填写）
          example: "oss-cn-hangzhou.aliyuncs.com"
        oss_cdn_domain:
          type: string
          description: OSS CDN 加速域名（可选）
          example: "https://cdn.example.com"
        oss_custom_domain:
          type: string
          description: OSS 自定义域名（可选）
          nullable: true
          example: "https://img.example.com"
        oss_region:
          type: string
          description: OSS 地域（可选）
          example: "cn-hangzhou"
        max_file_size:
          type: integer
          description: 最大文件大小（字节），默认5MB
          example: 5242880
        allowed_extensions:
          type: string
          description: 允许的文件扩展名（逗号分隔）
          example: "jpg,jpeg,png,webp,gif"

    TestStorageRequest:
      type: object
      required:
        - storage_type
      properties:
        storage_type:
          type: string
          description: 要测试的存储类型
          enum: [local, oss]
          example: oss
        oss_access_key_id:
          type: string
          description: 阿里云 OSS AccessKey ID（测试用，storage_type=oss 时必填）
          example: "LTAI5tXXXXXXXXXX"
        oss_access_key_secret:
          type: string
          description: 阿里云 OSS AccessKey Secret（测试用，storage_type=oss 时必填）
          example: "XXXXXXXXXXXXXXXXXXXXXXXXXX"
        oss_bucket_name:
          type: string
          description: OSS Bucket 名称（测试用）
          example: "qiaogongyishu"
        oss_endpoint:
          type: string
          description: OSS Endpoint（测试用）
          example: "oss-cn-hangzhou.aliyuncs.com"

    TestStorageData:
      type: object
      description: 存储连接测试结果
      properties:
        success:
          type: boolean
          description: 测试是否成功
          example: true
        message:
          type: string
          description: 测试结果描述
          example: "OSS 连接测试成功"
        latency:
          type: integer
          description: 连接延迟（毫秒）
          example: 128

    TestStorageResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: success
        data:
          $ref: '#/components/schemas/TestStorageData'
