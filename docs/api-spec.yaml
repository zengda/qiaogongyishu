components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Token 认证，通过管理员登录接口获取

  responses:
    BadRequest:
      description: 请求参数错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 400
            message: 请求参数错误
            data: null

    Unauthorized:
      description: 未授权，Token 无效或已过期
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 401
            message: 未授权，请先登录
            data: null

    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 404
            message: 资源不存在
            data: null

    TooManyRequests:
      description: 请求过于频繁
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 429
            message: 请求过于频繁，请稍后再试
            data: null

    InternalServerError:
      description: 服务器内部错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 500
            message: 服务器内部错误
            data: null

  schemas:
    # ============================================================
    # 通用响应结构
    # ============================================================

    SuccessResponse:
      type: object
      properties:
        code:
          type: integer
          description: 状态码
          example: 200
        message:
          type: string
          description: 提示信息
          example: success
        data:
          type: object
          nullable: true
          description: 响应数据
          example: null

    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          description: 错误状态码
          example: 400
        message:
          type: string
          description: 错误提示信息
          example: 请求参数错误
        data:
          description: 错误详情（通常为 null）
          nullable: true
          example: null

    PaginatedData:
      type: object
      description: 分页数据结构
      properties:
        items:
          type: array
          description: 数据列表
          items:
            type: object
        total:
          type: integer
          description: 总记录数
          example: 100
        page:
          type: integer
          description: 当前页码
          example: 1
        per_page:
          type: integer
          description: 每页数量
          example: 10
        pages:
          type: integer
          description: 总页数
          example: 10

    # ============================================================
    # 认证相关 Schema
    # ============================================================

    WxLoginRequest:
      type: object
      required:
        - code
      properties:
        code:
          type: string
          description: 微信小程序临时登录凭证
          example: "0a1B2c3D4e5F6g"

    WxLoginResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: success
        data:
          type: object
          properties:
            token:
              type: string
              description: JWT Token
              example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
            openid:
              type: string
              description: 微信用户唯一标识
              example: "oXJ9f5kqZ2mN8vR3wL7xY1pA4bC"

    AdminLoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: 管理员用户名
          example: admin
        password:
          type: string
          description: 管理员密码
          example: "123456"

    AdminLoginResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: success
        data:
          type: object
          properties:
            token:
              type: string
              description: JWT Token
              example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
            admin:
              $ref: '#/components/schemas/Admin'

    ChangePasswordRequest:
      type: object
      required:
        - old_password
        - new_password
        - confirm_password
      properties:
        old_password:
          type: string
          description: 原密码
          example: "123456"
        new_password:
          type: string
          description: 新密码
          example: "654321"
        confirm_password:
          type: string
          description: 确认新密码
          example: "654321"

    Admin:
      type: object
      description: 管理员信息
      properties:
        id:
          type: integer
          description: 管理员ID
          example: 1
        username:
          type: string
          description: 用户名
          example: admin
        real_name:
          type: string
          description: 真实姓名
          example: 管理员
        role:
          type: string
          description: 角色（super=超级管理员, admin=普通管理员）
          enum: [super, admin]
          example: super
        is_active:
          type: boolean
          description: 是否启用
          example: true
        last_login_at:
          type: string
          format: date-time
          description: 最后登录时间
          example: "2024-01-15T10:30:00+08:00"

    # ============================================================
    # 产品相关 Schema
    # ============================================================

    ProductImage:
      type: object
      description: 产品图片
      properties:
        id:
          type: integer
          description: 图片ID
          example: 1
        image_url:
          type: string
          description: 图片地址
          example: "https://cdn.example.com/images/product1/banner1.jpg"
        image_type:
          type: string
          description: 图片类型（banner=主图, detail=详情图）
          enum: [banner, detail]
          example: banner
        sort_order:
          type: integer
          description: 排序序号
          example: 1

    Tag:
      type: object
      description: 风格标签
      properties:
        id:
          type: integer
          description: 标签ID
          example: 1
        name:
          type: string
          description: 标签名称
          example: 新中式
        sort_order:
          type: integer
          description: 排序序号
          example: 1
        is_active:
          type: boolean
          description: 是否启用
          example: true

    Category:
      type: object
      description: 产品分类
      properties:
        id:
          type: integer
          description: 分类ID
          example: 1
        name:
          type: string
          description: 分类名称
          example: 三层
        sort_order:
          type: integer
          description: 排序序号
          example: 1
        is_active:
          type: boolean
          description: 是否启用
          example: true

    Product:
      type: object
      description: 产品信息
      properties:
        id:
          type: integer
          description: 产品ID
          example: 1
        title:
          type: string
          description: 产品标题
          example: "新中式三层乡村别墅"
        model_number:
          type: string
          description: 产品型号
          example: "QGY-2026-001"
        category_id:
          type: integer
          description: 分类ID
          example: 1
        category_name:
          type: string
          description: 分类名称
          example: 三层
        description:
          type: string
          description: 产品描述
          example: "新中式风格的乡村三层别墅，适合家庭居住"
        floor_area:
          type: string
          description: 建筑面积（如"180㎡"）
          example: "180㎡"
        building_area:
          type: string
          description: 占地面积（如"120㎡"）
          example: "120㎡"
        rooms:
          type: string
          description: 房间配置
          example: "3室2厅2卫"
        sort_order:
          type: integer
          description: 排序序号
          example: 1
        view_count:
          type: integer
          description: 浏览次数
          example: 256
        is_active:
          type: boolean
          description: 是否上架
          example: true
        created_at:
          type: string
          format: date-time
          description: 创建时间
          example: "2024-01-15T10:30:00+08:00"
        updated_at:
          type: string
          format: date-time
          description: 更新时间
          example: "2024-01-15T10:30:00+08:00"
        banner_images:
          type: array
          description: 主图列表
          items:
            $ref: '#/components/schemas/ProductImage'
        detail_images:
          type: array
          description: 详情图列表
          items:
            $ref: '#/components/schemas/ProductImage'
        tags:
          type: array
          description: 标签列表
          items:
            $ref: '#/components/schemas/Tag'

    ProductDetailResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: success
        data:
          $ref: '#/components/schemas/Product'

    ProductPaginatedData:
      type: object
      description: 产品分页数据
      allOf:
        - $ref: '#/components/schemas/PaginatedData'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/Product'

    ProductPaginatedResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: success
        data:
          $ref: '#/components/schemas/ProductPaginatedData'

    CreateProductRequest:
      type: object
      required:
        - title
        - category_id
      properties:
        title:
          type: string
          description: 产品标题
